<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои заказы</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 30px;
        }

        .box {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 24px;
            border-radius: 12px;
        }

        .order {
            border-bottom: 1px solid #eee;
            padding: 18px 0;
        }

        .order:last-child {
            border-bottom: none;
        }

        .status {
            font-weight: bold;
        }

        .items {
            margin-top: 12px;
            padding: 12px;
            background: #fafafa;
            border-radius: 8px;
        }

        .item {
            display: grid;
            grid-template-columns: 1fr 80px 120px 120px;
            gap: 12px;
            padding: 6px 0;
        }

        .total {
            margin-top: 12px;
            font-weight: bold;
        }

        .nav {
            margin-bottom: 20px;
        }

        .nav a {
            margin-right: 15px;
        }
    </style>
</head>
<body>

<div class="box">

    <div class="nav">
        <a href="/products">Каталог</a>
        <a href="/cart">Корзина</a>
        <a href="/orders">Мои заказы</a>

        <form action="/logout" method="post" style="display:inline;">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}" />
            <button type="submit">Выйти</button>
        </form>
    </div>

    <h1>Мои заказы</h1>

    <div th:if="${message}" style="color: green; margin-bottom: 15px;">
        <span th:text="${message}"></span>
    </div>

    <div th:if="${error}" style="color: #b00020; margin-bottom: 15px;">
        <span th:text="${error}"></span>
    </div>

    <div th:if="${#lists.isEmpty(orders)}">
        <p>Заказов пока нет.</p>
    </div>

    <div th:each="order : ${orders}" class="order">

        <h2>
            Заказ #<span th:text="${order.id}">1</span>
        </h2>

        <p>
            <strong>Дата:</strong>
            <span th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}">
                Дата
            </span>
        </p>

        <p>
            <strong>Статус:</strong>
            <span class="status" th:text="${order.status.displayName}">Статус</span>
        </p>

        <p th:if="${order.errorMessage != null}">
            <strong>Ошибка:</strong>
            <span th:text="${order.errorMessage}">Ошибка</span>
        </p>

        <div class="items">
            <div class="item" th:each="item : ${order.items}">
                <div th:text="${item.product.name}">Товар</div>

                <div>
                    x<span th:text="${item.quantity}">1</span>
                </div>

                <div>
                    <span th:text="${item.price}">0</span> ₽
                </div>

                <div>
                    <span th:text="${item.total}">0</span> ₽
                </div>
            </div>
        </div>

        <div class="total">
            Итого: <span th:text="${order.total}">0</span> ₽
        </div>

        <form th:if="${order.status.name() == 'SENT_TO_1C'}"
              th:action="@{/orders/{id}/cancel(id=${order.id})}"
              method="post"
              style="margin-top: 12px;">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}" />

            <button type="submit"
                    style="padding: 10px 14px; border: none; border-radius: 8px; background: #b00020; color: white; cursor: pointer;">
                Отменить заказ
            </button>
        </form>

    </div>

</div>
