<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Каталог товаров</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 30px;
        }

        h1 {
            margin-bottom: 25px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            background: #fafafa;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .category {
            color: #777;
            margin-bottom: 8px;
        }

        .price {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .stock {
            margin-bottom: 12px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #222;
            color: white;
            cursor: pointer;
        }

        .btn:disabled {
            background: #aaa;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<h1>Каталог товаров</h1>
<div style="margin-bottom: 20px;">
    <a href="/products">Каталог</a>
    |
    <a href="/cart">Корзина</a>
    |
    <a href="/orders">Мои заказы</a>
    |
    <form action="/logout" method="post" style="display:inline;">
        <button type="submit">Выйти</button>
    </form>
</div>
<div class="products">
    <div class="card" th:each="product : ${products}">

        <img th:if="${product.imageUrl != null}"
             th:src="${product.imageUrl}"
             alt="Фото товара">

        <div class="name" th:text="${product.name}">Название товара</div>

        <div class="category" th:text="${product.category}">Категория</div>

        <div class="price">
            <span th:text="${product.price}">0</span> ₽
        </div>

        <div class="stock">
            Остаток: <span th:text="${product.stock}">0</span>
        </div>

        <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
            <button class="btn"
                    type="submit"
                    th:disabled="${product.stock == null || product.stock <= 0}">
                В корзину
            </button>
        </form>

    </div>
</div>

</body>
</html>
