<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог товаров</title>
    <style>
        :root {
            --bg: #f4f6f8;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --border: #dfe5ec;
            --text: #17212b;
            --muted: #637083;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --danger: #b42318;
            --success: #087443;
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: Inter, "Segoe UI", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 44px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 28px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            letter-spacing: 0;
        }

        .brand-mark {
            display: grid;
            place-items: center;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            font-size: 17px;
            font-weight: 800;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-link,
        .logout-button {
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 12px;
            border-radius: 8px;
            border: 1px solid transparent;
            color: var(--muted);
            background: transparent;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
        }

        .nav-link:hover,
        .logout-button:hover {
            color: var(--text);
            background: var(--surface-soft);
            border-color: var(--border);
        }

        .nav-link.active {
            color: var(--accent);
            background: #eff6ff;
            border-color: #bfdbfe;
        }

        .hero {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 24px;
            margin-bottom: 24px;
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(30px, 4vw, 48px);
            line-height: 1.05;
            letter-spacing: 0;
        }

        .hero p {
            max-width: 620px;
            margin: 12px 0 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.55;
        }

        .summary {
            min-width: 190px;
            padding: 14px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .summary-label {
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .summary-value {
            margin-top: 4px;
            font-size: 26px;
            font-weight: 800;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 18px;
        }

        .card {
            display: flex;
            flex-direction: column;
            min-height: 430px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: #c5d0dc;
            box-shadow: 0 16px 36px rgba(15, 23, 42, 0.12);
        }

        .image-wrap {
            position: relative;
            display: grid;
            place-items: center;
            width: 100%;
            aspect-ratio: 4 / 3;
            background: linear-gradient(180deg, #ffffff 0%, #f1f5f9 100%);
            border-bottom: 1px solid var(--border);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 18px;
        }

        .image-placeholder {
            display: grid;
            place-items: center;
            width: 72px;
            height: 72px;
            border-radius: 8px;
            background: #e8eef6;
            color: var(--muted);
            font-size: 32px;
            font-weight: 800;
        }

        .badge {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            background: #ecfdf3;
            color: var(--success);
            border: 1px solid #abefc6;
        }

        .badge.out {
            background: #fff1f0;
            color: var(--danger);
            border-color: #fecdca;
        }

        .card-body {
            display: flex;
            flex: 1;
            flex-direction: column;
            padding: 16px;
        }

        .name {
            min-height: 48px;
            margin: 0 0 8px;
            font-size: 18px;
            font-weight: 800;
            line-height: 1.3;
        }

        .category {
            width: fit-content;
            max-width: 100%;
            margin-bottom: 14px;
            padding: 5px 9px;
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--muted);
            background: var(--surface-soft);
            font-size: 13px;
            font-weight: 700;
        }

        .meta {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: end;
            margin-top: auto;
            padding-top: 14px;
        }

        .meta-label {
            display: block;
            margin-bottom: 3px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .price {
            font-size: 22px;
            font-weight: 900;
            line-height: 1;
        }

        .stock {
            color: var(--muted);
            font-size: 15px;
            font-weight: 700;
            text-align: right;
        }

        .btn {
            width: 100%;
            min-height: 44px;
            margin-top: 16px;
            padding: 0 14px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            font: inherit;
            font-weight: 800;
            cursor: pointer;
            transition: background 160ms ease, transform 160ms ease;
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn:disabled {
            background: #cbd5e1;
            color: #64748b;
            cursor: not-allowed;
            transform: none;
        }

        .empty {
            padding: 36px;
            background: var(--surface);
            border: 1px dashed #b7c2cf;
            border-radius: 8px;
            color: var(--muted);
            text-align: center;
        }

        @media (max-width: 760px) {
            .page {
                width: min(100% - 20px, 1180px);
                padding-top: 12px;
            }

            .topbar,
            .hero {
                align-items: stretch;
                flex-direction: column;
            }

            .nav {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .nav-link,
            .logout-button {
                width: 100%;
            }

            .summary {
                min-width: 0;
            }
        }
    </style>
</head>
<body>

<main class="page">
    <header class="topbar">
        <a class="brand" href="/products" aria-label="Каталог">
            <span class="brand-mark">1C</span>
            <span>Shop</span>
        </a>

        <nav class="nav" aria-label="Основная навигация">
            <a class="nav-link active" href="/products">Каталог</a>
            <a class="nav-link" href="/cart">Корзина</a>
            <a class="nav-link" href="/orders">Мои заказы</a>
            <form action="/logout" method="post">
                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">
                <button class="logout-button" type="submit">Выйти</button>
            </form>
        </nav>
    </header>

    <section class="hero">
        <div>
            <h1>Каталог товаров</h1>
        </div>

        <aside class="summary">
            <div class="summary-label">Товаров в каталоге</div>
            <div class="summary-value" th:text="${#lists.size(products)}">0</div>
        </aside>
    </section>

    <section class="empty" th:if="${#lists.isEmpty(products)}">
        Каталог пока пуст. Запустите синхронизацию товаров из 1С.
    </section>

    <section class="products-grid" th:if="${!#lists.isEmpty(products)}">
        <article class="card" th:each="product : ${products}">
            <div class="image-wrap">
                <span class="badge"
                      th:classappend="${product.stock == null || product.stock <= 0} ? ' out'"
                      th:text="${product.stock == null || product.stock <= 0} ? 'Нет в наличии' : 'В наличии'">
                    В наличии
                </span>

                <img th:if="${product.imageUrl != null}"
                     th:src="${product.imageUrl}"
                     alt="Фото товара">

                <div class="image-placeholder" th:if="${product.imageUrl == null}">1C</div>
            </div>

            <div class="card-body">
                <h2 class="name" th:text="${product.name}">Название товара</h2>

                <div class="category" th:text="${product.category != null ? product.category : 'Без категории'}">Категория</div>

                <div class="meta">
                    <div>
                        <span class="meta-label">Цена</span>
                        <div class="price">
                            <span th:text="${product.price != null ? product.price : 0}">0</span> ₽
                        </div>
                    </div>

                    <div class="stock">
                        <span class="meta-label">Остаток</span>
                        <span th:text="${product.stock != null ? product.stock : 0}">0</span>
                    </div>
                </div>

                <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                    <input type="hidden"
                           th:if="${_csrf != null}"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">
                    <button class="btn"
                            type="submit"
                            th:disabled="${product.stock == null || product.stock <= 0}">
                        В корзину
                    </button>
                </form>
            </div>
        </article>
    </section>

</main>

</body>
</html>
