<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Корзина</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 30px;
        }

        .cart {
            background: white;
            padding: 20px;
            border-radius: 12px;
            max-width: 900px;
            margin: 0 auto;
        }

        .item {
            display: grid;
            grid-template-columns: 100px 1fr 100px 120px 120px;
            gap: 15px;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding: 15px 0;
        }

        .item img {
            width: 100px;
            height: 80px;
            object-fit: contain;
            background: #fafafa;
        }

        .total {
            font-size: 22px;
            font-weight: bold;
            margin-top: 20px;
            text-align: right;
        }

        .btn {
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            background: #222;
            color: white;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-danger {
            background: #b00020;
        }

        .actions {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
<div style="margin-bottom: 20px;">
    <a href="/products">Каталог</a>
    |
    <a href="/cart">Корзина</a>
    |
    <a href="/orders">Мои заказы</a>
    |
    <form action="/logout" method="post" style="display:inline;">
        <button type="submit">Выйти</button>
    </form>
</div>
<div class="cart">
    <h1>Корзина</h1>


    <div th:if="${#lists.isEmpty(items)}">
        <p>Корзина пуста.</p>
        <a class="btn" href="/products">Вернуться в каталог</a>
    </div>

    <div th:if="${!#lists.isEmpty(items)}">

        <div class="item" th:each="item : ${items}">
            <img th:src="${item.product.imageUrl}" alt="Фото">

            <div>
                <strong th:text="${item.product.name}">Товар</strong>
                <div th:text="${item.product.category}">Категория</div>
            </div>

            <div>
                x<span th:text="${item.quantity}">1</span>
            </div>

            <div>
                <span th:text="${item.product.price}">0</span> ₽
            </div>

            <div>
                <form th:action="@{/cart/remove/{id}(id=${item.product.id})}" method="post">
                    <button class="btn btn-danger" type="submit">Удалить</button>
                </form>
            </div>
        </div>

        <div class="total">
            Итого: <span th:text="${total}">0</span> ₽
        </div>

        <div class="actions">
            <a class="btn" href="/products">Продолжить покупки</a>
            <a class="btn" href="/checkout">Оформить заказ</a>
        </div>

    </div>
</div>

</body>
</html>
