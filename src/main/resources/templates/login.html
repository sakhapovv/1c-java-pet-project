<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 30px; }
        .box { max-width: 450px; margin: 0 auto; background: white; padding: 24px; border-radius: 12px; }
        label { display: block; margin-top: 14px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; }
        .btn { margin-top: 20px; padding: 12px 16px; border: none; background: #222; color: white; border-radius: 8px; cursor: pointer; width: 100%; }
        .error { color: #b00020; margin-top: 8px; }
        .success { color: green; margin-top: 8px; }
    </style>
</head>
<body>

<div class="box">
    <h1>Вход</h1>

    <div class="success" th:if="${param.registered}">
        Регистрация успешна. Теперь войдите.
    </div>

    <div class="error" th:if="${param.error}">
        Неверный email или пароль.
    </div>

    <div class="success" th:if="${param.logout}">
        Вы вышли из аккаунта.
    </div>

    <form th:action="@{/login}" method="post">

        <label>Email</label>
        <input type="email" name="email">

        <label>Пароль</label>
        <input type="password" name="password">

        <button class="btn" type="submit">Войти</button>
    </form>

    <p>
        Нет аккаунта? <a href="/register">Зарегистрироваться</a>
    </p>
</div>

</body>
</html>
